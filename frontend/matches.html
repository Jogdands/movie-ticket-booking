<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Matches</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at center, #2E003E 0%, #000000 80%);
  color: white;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 30px;
  background: rgba(0,0,0,0.9);
}

header a { color: white; text-decoration: none; font-weight: bold; }

section { padding: 40px 30px; }

section h2 {
  margin-bottom: 20px;
  font-size: 28px;
  border-left: 5px solid #ff4d6d;
  padding-left: 10px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 20px;
}

.card {
  background: rgba(0,0,0,0.6);
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.3s, box-shadow 0.3s;
}

.card:hover {
  transform: translateY(-8px);
  box-shadow: 0 0 20px rgba(255,77,109,0.7);
}

.card img { width: 100%; height: 250px; object-fit: cover; }

.card p { text-align: center; padding: 10px; }

/* ✅ ADDED BUTTON STYLE */
.btn {
  display: block;
  width: 80%;
  margin: 10px auto 15px;
  padding: 8px 10px;
  background: #ff4d6d;
  color: white;
  border: none;
  border-radius: 20px;
  cursor: pointer;
  font-weight: bold;
}

.btn:hover {
  background: #ff1f4b;
}

footer { text-align: center; padding: 20px; background: #111; margin-top: 40px; }
</style>
</head>

<body>

<header>
  <a href="index.html">⬅ Back to Home</a>
</header>

<section>
  <h2>Today's Live Matches</h2>
  <div class="grid" id="matchesGrid"></div>
</section>

<footer>
  © 2026 Movie Booking. All rights reserved.
</footer>

<script>

const liveMatches = [
  { title: "India vs West Indies", time: "7:30 PM", img: "https://cdn.wionews.com/sites/default/files/2023/08/02/370832-untitled-design-2023-08-02t164307230.png" },
  { title: "SL W V WI W", time: "8:00 PM", img: "https://tse4.mm.bing.net/th/id/OIP.BiU4qe7bdBQ1wdhc3KJLSgAAAA?rs=1&pid=ImgDetMain&o=7&rm=3" },
  { title: "England open badminton ", time: "6:00 PM", img: "https://www.vidio.com/blog/wp-content/uploads/sites/2/2026/03/ATK-BOLANET_BWF-2026_ALL-ENGLAND-2026_GENERAL-1-1024x576.png" }
];

const matchesGrid = document.getElementById("matchesGrid");

liveMatches.forEach(match => {
  const card = document.createElement("div");
  card.className = "card";

  card.innerHTML = `
    <img src="${match.img}" alt="${match.title}">
    <p>${match.title}<br>Time: ${match.time}</p>

    <!-- ✅ ONLY ADDED THIS BUTTON -->
<button class="btn" onclick="bookNow('${match.title}', '${match.time}')">
  Book Now
</button>
  `;

  matchesGrid.appendChild(card);
});

/* ✅ NEW FUNCTION (ADDED ONLY) */
function bookNow(matchName, time){
  localStorage.setItem("selectedMatch", matchName);
  localStorage.setItem("selectedTime", time);

  console.log("Redirecting..."); // for debugging

  window.location.href = "./matchpayment.html";
}
</script>

</body>
</html>
