<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upcoming Movies</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at center, #2E003E 0%, #000000 80%);
  color: white;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 30px;
  background: rgba(0,0,0,0.9);
}

header a {
  color: white;
  text-decoration: none;
  font-weight: bold;
}

section { padding: 40px 30px; }

section h2 {
  margin-bottom: 20px;
  font-size: 28px;
  border-left: 5px solid #ff4d6d;
  padding-left: 10px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 20px;
}

.card {
  background: rgba(0,0,0,0.6);
  border-radius: 10px;
  overflow: hidden;
  transition: transform 0.3s, box-shadow 0.3s;
  display: flex;
  flex-direction: column;
}

.card:hover {
  transform: translateY(-8px);
  box-shadow: 0 0 20px rgba(255,77,109,0.7);
}

.card img {
  width: 100%;
  height: 250px;
  object-fit: cover;
}

.card p {
  text-align: center;
  padding: 10px;
  margin: 0;
}

.prebook-btn {
  margin: 10px;
  padding: 8px;
  border: none;
  border-radius: 6px;
  background: #ff4d6d;
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

.prebook-btn:hover {
  background: #ff1f4b;
  transform: scale(1.05);
}

footer {
  text-align: center;
  padding: 20px;
  background: #111;
  margin-top: 40px;
}
</style>
</head>

<body>

<header>
  <a href="upcoming.html">⬅ Back to Upcoming</a>
</header>

<section>
  <h2>Upcoming Movies</h2>
  <div class="grid" id="upMoviesGrid"></div>
</section>

<footer>
  © 2026 Movie Booking. All rights reserved.
</footer>

<script>
const upcomingMovies = [
  { title: "TOXIC", release: "2026-03-15", img: "https://i.pinimg.com/1200x/e6/a7/c4/e6a7c47206541c733222bedd3b0f4582.jpg" },
  { title: "HOPPERS", release: "2026-04-01", img: "https://i.pinimg.com/1200x/a1/6c/8b/a16c8b0acf8a3bffac82cddae36a7627.jpg" },
  { title: "PARADISE", release: "2026-04-20", img: "https://i.pinimg.com/736x/11/c0/b7/11c0b7ee29a0beb1cefee0a54a432464.jpg" },
  { title: "KING", release: "2026-04-20", img: "https://assets-in.bmscdn.com/iedb/movies/images/mobile/thumbnail/xlarge/king-et00455480-1769617085.jpg" }
];

const grid = document.getElementById("upMoviesGrid");

upcomingMovies.forEach(movie => {
  const card = document.createElement("div");
  card.className = "card";

  card.innerHTML = `
    <img src="${movie.img}">
    <p>${movie.title}<br>Release: ${movie.release}</p>
    <button class="prebook-btn">🎟 Pre Book</button>
  `;

  // ✅ BEST PRACTICE CLICK HANDLER
  card.querySelector(".prebook-btn").addEventListener("click", () => {

    // 🔥 CLEAR OLD DATA (important)
    localStorage.removeItem("selectedSeats");
    localStorage.removeItem("seatType");

    // ✅ SAVE CORRECT DATA
    localStorage.setItem("movie", movie.title);
    localStorage.setItem("selectedDate", movie.release);
    localStorage.setItem("selectedTime", "Coming Soon");

    console.log("Saved Movie:", movie.title);

    // ✅ REDIRECT
    window.location.href = "datetime.html";
  });

  grid.appendChild(card);
});
</script>

</body>
</html>
