<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sign Up</title>
<style>
body {
  font-family: Arial;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background: linear-gradient(135deg,#416dff,#ff4b2b);
  margin: 0;
  color: white;
}
.container {
  background: rgba(0,0,0,0.6);
  padding: 30px;
  border-radius: 10px;
  width: 300px;
  text-align: center;
}
input { width: 90%; padding: 10px; margin: 10px 0; border-radius:5px; border:none; }
button { padding:10px 20px; background:#2d1fcd; border:none; border-radius:5px; cursor:pointer; color:white; font-weight:bold;}
a{color:#3b5cff; text-decoration:none;}
</style>
</head>
<body>
<div class="container">
  <h2>Sign Up</h2>
  <input type="text" id="signupUsername" placeholder="Username" required><br>
  <input type="password" id="signupPassword" placeholder="Password" required><br>
  <button id="signupBtn">Sign Up</button>
  <p>Already have an account? <a href="login.html">Login</a></p>
</div>

<script>
document.getElementById('signupBtn').addEventListener('click', function(){
    const username = document.getElementById('signupUsername').value.trim();
    const password = document.getElementById('signupPassword').value.trim();

    if(!username || !password){
        alert("Enter both username and password!");
        return;
    }

    // Save as single object
    const user = {username: username, password: password};
    localStorage.setItem('user', JSON.stringify(user));
    localStorage.setItem('loggedIn', 'true');

    alert("Signup successful!");
    window.location.href = "index.html";
});
</script>
</body>
</html>
