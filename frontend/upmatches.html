<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upcoming Matches</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at center, #2E003E 0%, #000000 80%);
  color: white;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 30px;
  background: rgba(0,0,0,0.9);
}

header a {
  color: white;
  text-decoration: none;
  font-weight: bold;
}

section { padding: 40px 30px; }

section h2 {
  margin-bottom: 20px;
  font-size: 28px;
  border-left: 5px solid #ff4d6d;
  padding-left: 10px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 20px;
}

.card {
  background: rgba(0,0,0,0.6);
  border-radius: 10px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transition: transform 0.3s;
}

.card:hover {
  transform: translateY(-8px);
}

.card img {
  width: 100%;
  height: 250px;
  object-fit: cover;
}

.card p {
  text-align: center;
  padding: 10px;
  margin: 0;
}

/* 🔥 BUTTON */
.prebook-btn {
  margin: 10px;
  padding: 8px;
  border: none;
  border-radius: 6px;
  background: #ff4d6d;
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

.prebook-btn:hover {
  background: #ff1f4b;
  transform: scale(1.05);
}

footer {
  text-align: center;
  padding: 20px;
  background: #111;
  margin-top: 40px;
}
</style>
</head>

<body>

<header>
  <a href="upcoming.html">⬅ Back to Upcoming</a>
</header>

<section>
  <h2>Upcoming Matches</h2>
  <div class="grid" id="upMatchesGrid"></div>
</section>

<footer>
  © 2026 Movie Booking. All rights reserved.
</footer>


<script>
const upcomingMatches = [
  { title: "India vs England", date: "2026-03-10", img:"https://aimages.willow.tv/livehltsthumbnail/10278_hlts.jpg"},
  { title: "Australia vs NZ", date: "2026-03-12", img: "https://tse2.mm.bing.net/th/id/OIP.VqnoLJbWnK2rzo9BwmWr7AHaGD" },
  { title: "Pak vs Bangladesh", date: "2026-03-15", img: "https://img.freepik.com/premium-vector/cricket-world-cup-2023-participating-team-pakistan-vs-bangladesh_650144-953.jpg?w=2000" }
];

const grid = document.getElementById("upMatchesGrid");

upcomingMatches.forEach(match => {
  const card = document.createElement("div");
  card.className = "card";

  card.innerHTML = `
    <img src="${match.img}" alt="${match.title}">
    <p>${match.title}<br>Date: ${match.date}</p>

    <button onclick="prebookMatch('${match.title}','${match.date}')"
      style="margin:10px;padding:8px;background:#ff4d6d;color:white;border:none;border-radius:6px;cursor:pointer;">
      🎟 Pre Book
    </button>
  `;

  grid.appendChild(card);
});

function prebookMatch(title, date){
  localStorage.setItem("selectedMatch", JSON.stringify({title,date}));
  window.location.href = "matchpayment.html";
}
</script>
</body>
</html>
