<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All New Movies</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at center, #2E003E 0%, #000000 80%);
  color: white;
}

header {
  padding: 15px 30px;
  background: rgba(0,0,0,0.9);
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 20px;
  padding: 20px;
}

/* CARD */
.card {
  background: rgba(0,0,0,0.6);
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-8px);
  box-shadow: 0 0 20px rgba(255,77,109,0.7);
}

.card img {
  width: 100%;
  height: 250px;
  object-fit: cover;
}

.card p {
  text-align: center;
  padding: 10px;
}

/* BUTTON */
.book-btn {
  display: block;
  width: 80%;
  margin: 10px auto 15px;
  padding: 8px;
  background: #ff4d6d;
  color: white;
  border: none;
  border-radius: 20px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

.book-btn:hover {
  background: #ff1f4d;
}

/* DROPDOWN */
.genre-box {
  position: relative;
  margin: 20px 30px;
}

#genreBtn {
  padding: 12px 25px;
  background: #ff4d6d;
  border: none;
  border-radius: 30px;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

#genreDropdown {
  display: none;
  position: absolute;
  top: 55px;
  background: #111;
  padding: 10px;
  border-radius: 10px;
  width: 180px;
}

#genreDropdown button {
  display: block;
  width: 100%;
  padding: 10px;
  margin: 4px 0;
  border: none;
  border-radius: 8px;
  background: transparent;
  color: white;
  cursor: pointer;
  text-align: left;
}

#genreDropdown button:hover {
  background: rgba(255,77,109,0.2);
}
</style>
</head>

<body>

<header>
  <a href="index.html" style="color:white;text-decoration:none;font-size:18px;">⬅ Back</a>
</header>

<h2 style="padding:20px;">🔥 All New Movies</h2>

<!-- GENRE FILTER -->
<div class="genre-box">
  <button id="genreBtn">Genre ▼</button>
  <div id="genreDropdown"></div>
</div>

<!-- MOVIES -->
<div class="grid" id="allNewMovies"></div>

<script>

const container = document.getElementById("allNewMovies");
const dropdown = document.getElementById("genreDropdown");
const genreBtn = document.getElementById("genreBtn");

let allMovies = [];

/* GENRE LIST */
const genres = ["all", "action", "comedy", "romance", "sci-fi", "thriller"];

/* CREATE DROPDOWN */
genres.forEach(g => {
  const btn = document.createElement("button");
  btn.innerText = g.toUpperCase();

  btn.onclick = () => {
    displayMovies(g);
    dropdown.style.display = "none";
  };

  dropdown.appendChild(btn);
});

/* TOGGLE DROPDOWN */
genreBtn.onclick = () => {
  dropdown.style.display =
    dropdown.style.display === "block" ? "none" : "block";
};

/* FETCH MOVIES */
fetch("http://localhost:5000/api/movies")
.then(res => res.json())
.then(data => {

  // FIX: normalize genre
  allMovies = data.map(m => ({
    ...m,
    genre: (m.genre || "").toLowerCase().trim()
  }));

  displayMovies("all");
});

/* DISPLAY FUNCTION */
function displayMovies(genre){

  container.innerHTML = "";

  let filtered = (genre === "all")
    ? allMovies
    : allMovies.filter(m => m.genre === genre);

  filtered.slice().reverse().forEach(m => {

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
  <img src="${m.img || m.image}">
  <p>${m.title}</p>
  <button class="book-btn">BOOK NOW</button>
`;
    card.querySelector(".book-btn").onclick = (e) => {
      e.stopPropagation();
     card.querySelector(".book-btn").onclick = (e) => {
  e.stopPropagation();

  // ✅ SAME KEYS AS OTHER PAGES
  localStorage.setItem("movie", m.title);
  localStorage.setItem("price", m.price || 200);

  // साफ ठेवण्यासाठी
  localStorage.removeItem("selectedDate");
  localStorage.removeItem("selectedTime");

  window.location.href = "datetime.html";
};
      window.location.href = "datetime.html";
    };

    container.appendChild(card);
  });
}

</script>

</body>
</html>
