<!DOCTYPE html>
<html>
<head>
<title>Movie Ticket</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background: radial-gradient(circle at top,#1a001f,#000);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.ticket{
  width:360px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:18px;
  padding:20px;
  box-shadow:0 10px 40px rgba(0,0,0,0.6);
  position:relative;
  overflow:hidden;
}

/* CUT STYLE */
.ticket:before,
.ticket:after{
  content:"";
  position:absolute;
  width:40px;
  height:40px;
  background:#000;
  border-radius:50%;
  top:50%;
  transform:translateY(-50%);
}

.ticket:before{ left:-20px; }
.ticket:after{ right:-20px; }

h2{
  text-align:center;
  color:#ff4d6d;
}

.info{
  margin-top:15px;
  line-height:1.8;
}

.row{
  display:flex;
  justify-content:space-between;
  margin:6px 0;
}

.id{
  text-align:center;
  margin-top:15px;
  font-size:12px;
  color:#aaa;
}

.badge{
  text-align:center;
  margin-top:10px;
  padding:5px 10px;
  background:#ff2e55;
  display:inline-block;
  border-radius:8px;
  font-size:12px;
}
</style>
</head>

<body>

<div class="ticket">

<h2>🎬 CINEMA TICKET</h2>

<div class="badge">CONFIRMED</div>

<div class="info" id="info"></div>

<div class="id" id="id"></div>

</div>

<script>

// 🔥 READ SINGLE SOURCE
let booking = JSON.parse(localStorage.getItem("booking"));

if(!booking){
  document.getElementById("info").innerHTML =
  "❌ No booking found. Please book again.";
}
else{

  let pricePerSeat = booking.type==="vip"?250:
                     booking.type==="premium"?180:120;

  let total = (pricePerSeat * booking.seats.length) + 40;

  document.getElementById("info").innerHTML = `
    <div class="row"><span>Movie</span><span>${booking.movie}</span></div>
    <div class="row"><span>Name</span><span>${booking.userName || "Guest"}</span></div>
    <div class="row"><span>Seats</span><span>${booking.seats.join(", ")}</span></div>
    <div class="row"><span>Type</span><span>${booking.type}</span></div>
    <div class="row"><span>Date</span><span>${booking.date}</span></div>
    <div class="row"><span>Time</span><span>${booking.time}</span></div>
    <hr>
    <div class="row"><strong>Total</strong><strong>₹${total}</strong></div>
  `;

  document.getElementById("id").innerHTML =
    "Booking ID: " + booking.bookingId;
}

</script>

</body>
</html>
