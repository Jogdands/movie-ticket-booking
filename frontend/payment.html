<!DOCTYPE html>
<html>
<head>
<title>Payment</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background: radial-gradient(circle at top,#1a001f,#000);
  color:white;
}

.container{
  display:flex;
  gap:20px;
  padding:20px;
}

.left,.right{
  width:50%;
}

.card{
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:18px;
  padding:20px;
}

h2,h3{
  color:#ff4d6d;
}

input,select{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:10px;
  border:none;
  background:#1e1e2f;
  color:white;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#ff2e55,#ff5f7e);
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.options{
  display:flex;
  gap:10px;
  margin-bottom:10px;
}

.option{
  flex:1;
  padding:10px;
  text-align:center;
  background:#1e1e2f;
  border-radius:10px;
  cursor:pointer;
}

.active{
  background:#ff2e55;
}

.row{
  display:flex;
  justify-content:space-between;
  margin:8px 0;
}

hr{
  border:0;
  border-top:1px solid rgba(255,255,255,0.2);
}
</style>
</head>

<body>

<div class="container">

<div class="left">

<div class="card">
<h2>Contact Details</h2>

<input placeholder="Email">
<input placeholder="Phone (+91)">
<button>Continue</button>
</div>

<br>

<div class="card">
<h2>Payment Method</h2>

<div class="options">
<div class="option active" onclick="show('upi')">UPI</div>
<div class="option" onclick="show('card')">Card</div>
<div class="option" onclick="show('net')">Bank</div>
</div>

<div id="upi">
<input placeholder="UPI ID">
</div>

<div id="card" style="display:none;">
<input placeholder="Card Number">
<input placeholder="Name">
<input placeholder="Expiry">
<input placeholder="CVV">
</div>

<div id="net" style="display:none;">
<select>
<option>SBI</option>
<option>HDFC</option>
<option>ICICI</option>
</select>
</div>

</div>

</div>

<div class="right">

<div class="card">
<h3>ORDER SUMMARY</h3>

<p id="movie"></p>
<p id="seats"></p>
<p id="datetime"></p>

<div class="row">
<span>Tickets</span>
<span id="price"></span>
</div>

<div class="row">
<span>Fee</span>
<span>₹40</span>
</div>

<hr>

<div class="row">
<strong>Total</strong>
<strong id="total"></strong>
</div>

<button onclick="pay()">Pay Now</button>

</div>

</div>

</div>

<script>

function show(type){
document.getElementById("upi").style.display="none";
document.getElementById("card").style.display="none";
document.getElementById("net").style.display="none";

document.getElementById(type).style.display="block";
}

let seats=[];

try{
seats=JSON.parse(localStorage.getItem("selectedSeats"));
if(!Array.isArray(seats)) seats=[];
}catch(e){
seats=[];
}

let type=localStorage.getItem("seatType") || "regular";
let movie=localStorage.getItem("movie") || "Movie Not Selected";

/* FIXED DATE SOURCE */
let bookingData=JSON.parse(localStorage.getItem("booking")) || {};

let date=bookingData.date || "Not Selected";
let time=bookingData.time || "Not Selected";

let pricePerSeat=
type==="vip"?250:
type==="premium"?180:120;

let subtotal=pricePerSeat*seats.length;
let total=subtotal+40;

document.getElementById("movie").innerText="🎬 "+movie;

document.getElementById("seats").innerText=
seats.length ?
"💺 "+seats.join(", ")
:"💺 No seats";

document.getElementById("datetime").innerText=
"📅 "+date+" ⏰ "+time;

document.getElementById("price").innerText="₹"+subtotal;
document.getElementById("total").innerText="₹"+total;


function pay(){

let seats=JSON.parse(localStorage.getItem("selectedSeats")) || [];

let booking={
username:"Guest",
movie:localStorage.getItem("movie"),
date:bookingData.date,
time:bookingData.time,
seats:seats,
amount:seats.length*120+40,
type:type
};

fetch("http://localhost:5000/api/bookings",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(booking)
})
.then(res=>res.json())
.then(data=>{
alert("Booking Successful 🎉");
localStorage.setItem("booking",JSON.stringify(booking));
window.location.href="ticket.html";
})
.catch(err=>{
console.log(err);
alert("Booking failed ❌ Check server");
});

}
</script>

</body>
</html>
